services:
  postgres:
    image: postgres:16-alpine
    container_name: mood_place_db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: mood_place_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ViewWanchai_2547
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d mood_place_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
